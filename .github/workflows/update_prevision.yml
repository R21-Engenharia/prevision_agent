name: Atualizar cache Prevision

on:
  schedule:
    # Segunda a sexta, 09:00 UTC = 06:00 BRT
    - cron: "0 9 * * 1-5"
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Sem isto o job coleta tudo e falha no push com 403: o GITHUB_TOKEN nasce
    # somente-leitura, e o github-actions[bot] nao consegue commitar o cache.
    # A coleta inteira (~25 min) era descartada no ultimo passo.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install httpx python-dotenv openpyxl gql[httpx] rich pandas pyarrow

      - name: Coletar QA (modelos FVS por atividade)
        env:
          PREVISION_TOKEN: ${{ secrets.PREVISION_TOKEN }}
        run: python phase2_qa_analysis.py

      - name: Coletar Activities (progresso por pavimento)
        env:
          PREVISION_TOKEN: ${{ secrets.PREVISION_TOKEN }}
        run: python phase3_collect_activities.py

      - name: Coletar Jobs FVS (liberados + status)
        env:
          PREVISION_TOKEN: ${{ secrets.PREVISION_TOKEN }}
          # Sem isto o script reaproveita o jobs_raw.json existente e a coleta
          # agendada nunca atualiza o dado que decide "pacote liberado".
          PREVISION_FORCE_REFRESH: "1"
        run: python fase4_fvs_liberados.py

      - name: Commit e push do cache atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/

          if git diff --staged --quiet; then
            echo "Sem alteracoes no cache"
            exit 0
          fi

          git commit -m "chore: atualiza cache Prevision $(date +%Y-%m-%d) [skip ci]"

          # A coleta leva ~25 min. Se master avancou nesse intervalo, o push
          # seria rejeitado e todo o trabalho perdido — daí o rebase e as
          # tentativas.
          for tentativa in 1 2 3; do
            if git push; then
              echo "Cache publicado"
              exit 0
            fi
            echo "Push rejeitado (tentativa $tentativa) — rebaseando sobre o remoto"
            git pull --rebase origin master || break
          done

          echo "::error::Nao foi possivel publicar o cache coletado"
          exit 1

      # Rede de seguranca: se o push falhar, os dados coletados ficam
      # disponiveis para download em vez de se perderem com o runner.
      - name: Guardar cache coletado como artefato
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cache-prevision-${{ github.run_number }}
          path: data/raw/
          retention-days: 7
