<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: transparent; }
#google-btn {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 9px 16px;
    border: 1.5px solid #dadce0;
    border-radius: 8px;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    color: #3c4043;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
}
#google-btn:hover { background: #f8f9fa; border-color: #c0c6cf; }
#google-btn svg  { width: 18px; height: 18px; flex-shrink: 0; }
</style>
</head>
<body>

<button id="google-btn" type="button">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
  </svg>
  Entrar com Google
</button>

<script>
(function () {
    "use strict";

    /* ── Mensagens Streamlit ────────────────────────────────────────────── */
    function post(type, value, extra) {
        var msg = { isStreamlitMessage: true, type: type };
        if (value !== undefined) { msg.value = value; msg.dataType = "json"; }
        if (extra) { Object.assign(msg, extra); }
        window.parent.postMessage(msg, "*");
    }

    function setHeight(px) {
        post("streamlit:setFrameHeight", undefined, { height: px });
    }

    /* ── Detectar tokens OAuth no hash da URL pai ───────────────────────── */
    function processHash() {
        try {
            var hash = window.top.location.hash;
            if (hash && hash.indexOf("access_token") !== -1) {
                var p = new URLSearchParams(hash.slice(1));
                var at = p.get("access_token") || "";
                var rt = p.get("refresh_token") || "";
                if (at) {
                    var clean = window.top.location.pathname
                        + "?oauth_at=" + encodeURIComponent(at)
                        + "&oauth_rt=" + encodeURIComponent(rt);
                    window.top.location.replace(clean);
                    return true; /* redirecionando — não sinalizar ready */
                }
            }
        } catch (e) {
            /* cross-origin: não consegue ler hash — ignorar */
        }
        return false;
    }

    /* ── Receber dados do Python e renderizar botao ──────────────────────── */
    window.addEventListener("message", function (e) {
        if (!e.data || e.data.type !== "streamlit:render") return;
        var args = e.data.args || {};
        var gurl = args.google_url || "";
        var btn  = document.getElementById("google-btn");

        if (gurl && btn) {
            btn.style.display = "flex";
            btn.onclick = function () {
                try {
                    window.top.location.href = gurl;
                } catch (err) {
                    window.location.href = gurl;
                }
            };
            setHeight(44);
        } else {
            setHeight(0);
        }

        post("streamlit:setComponentValue", null);
    });

    /* ── Inicializar ────────────────────────────────────────────────────── */
    if (!processHash()) {
        post("streamlit:componentReady", undefined, { apiVersion: 1 });
        setHeight(0);
    }
})();
</script>
</body>
</html>
