<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<!--
  Este componente faz UMA coisa: lê window.top.location.hash e devolve ao Python.
  Ler hash é permitido com allow-same-origin.
  Navegar window.top requer allow-top-navigation (bloqueado pelo browser no Streamlit).
  Por isso o botão Google e a navegação são feitos fora do iframe (st.markdown <a>).
-->
<body style="margin:0;padding:0;height:0;overflow:hidden;">
<script>
(function () {
    var hashValue = "";
    try {
        hashValue = window.top.location.hash || "";
        // Limpa o hash da URL sem causar navegação (history.replaceState é permitido)
        if (hashValue && hashValue.indexOf("access_token") !== -1) {
            try {
                window.top.history.replaceState(
                    null, "",
                    window.top.location.pathname + window.top.location.search
                );
            } catch (e) { /* ignora se bloqueado */ }
        }
    } catch (e) {
        hashValue = "";
    }

    // Protocolo Streamlit
    window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
        "*"
    );
    window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: 0 },
        "*"
    );
    window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:setComponentValue",
          value: hashValue, dataType: "json" },
        "*"
    );
})();
</script>
</body>
</html>
